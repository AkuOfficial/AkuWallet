<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AkuWallet</title>
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0B1020; }
      .fg { fill: #FFFFFF; }
      .accent { fill: #4F8CFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #F6F7FB; }
      .fg { fill: #0B1020; }
      .accent { fill: #2B63FF; }
    }
  </style>

  <!-- Rounded app-icon background -->
  <rect class="bg" x="0" y="0" width="180" height="180" rx="40" />

  <!-- Wallet shape -->
  <path
    class="fg"
    d="M46 68c0-7.732 6.268-14 14-14h60c11.046 0 20 8.954 20 20v40c0 11.046-8.954 20-20 20H60c-7.732 0-14-6.268-14-14V68Z"
    opacity="0.92"
  />
  <path
    class="bg"
    d="M60 60h58c5.523 0 10 4.477 10 10v6H60c-5.523 0-10-4.477-10-10s4.477-6 10-6Z"
    opacity="0.22"
  />

  <!-- "A" mark -->
  <path
    class="accent"
    d="M90 66c-2.4 0-4.57 1.43-5.52 3.64L67.9 112.8c-.7 1.67.52 3.5 2.33 3.5h8.4c1.3 0 2.47-.8 2.93-2.01l2.7-7.09h19.46l2.7 7.09c.46 1.21 1.63 2.01 2.93 2.01h8.4c1.81 0 3.03-1.83 2.33-3.5L95.52 69.64A6 6 0 0 0 90 66Zm-2.69 30.1 4.69-12.32 4.69 12.32H87.31Z"
  />

  <!-- Wallet button -->
  <circle class="bg" cx="124" cy="94" r="6" opacity="0.35" />
